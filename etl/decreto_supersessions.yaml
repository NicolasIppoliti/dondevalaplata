# Curated table of superseded municipal decretos for the adjudicaciones
# monitor (data/adjudicaciones.json, feature G3). This is the SOURCE OF TRUTH
# for the only case in which a parsed adjudicación row is dropped from, or has
# its amount rewritten in, the published dataset.
#
# WHY THIS IS CURATED AND NOT AUTOMATED. The municipality voids and re-issues
# its own awards, so the raw bulletins contain acts that no longer stand. Left
# alone the portal double-counts them -- and double-counting is the worse
# failure direction: it publicly OVERSTATES how much public money a named
# private company received. Decreto 579/2023 is the sharpest case; the
# municipality itself wrote that it had named the wrong adjudicatario, so the
# portal was asserting that BERNARDO LEW SRL received money the Municipality
# says on the record it never awarded to that firm.
#
# The obvious fix -- detect "Derógase/Rectifícase ... Decreto Nº N/YY" and drop
# the target -- was designed, measured, and REJECTED, because every automatic
# version of it erases real spending:
#   * The same verb covers "the whole award is void" (588/2023, which replaces
#     the counterparty) and "one digit was wrong" (799/2023, which only fixes
#     an arithmetic slip under Art. 115 of Ordenanza General 267). Dropping on
#     the verb deletes ARS 4.137.152 of contracts that were built and paid.
#   * A derogation says nothing about whether the money moved. Decretos
#     510/2023 and 511/2023 were derogated for procedural omissions and then
#     reinstated verbatim a week later by 536/2023 and 537/2023. The payments
#     happened.
#   * Target references are ambiguous. 114/2026 writes "el Decreto No 98
#     dictado el día 06 de marzo de 2026" with no year, and decree numbers
#     repeat across years -- 115 is both a rectifying decree in 2023 and the
#     COMADAR award that must be KEPT in 2026.
#   * Decisively: the act that voids 98/2026 is 114/2026, which parses to zero
#     rows. No rule that inspects only published rows can ever see it. The
#     supersession authority has to live outside the row set.
#
# So the regexes in sibom_adjudicaciones.py are DETECTORS ONLY. They cannot
# drop anything; their sole power is to fail a test when they fire on a
# decreto that is in neither section of this file. That is how a future
# archive refresh surfaces a new supersession without code being able to
# delete public money on its own. Same curated-table pattern as
# etl/vendor_aliases.yaml, etl/deuda_anomalies.yaml and etl/titularidad.yaml.
#
# TWO SCOPES:
#   full        -- the award is void. The row is dropped, but ONLY when the
#                  `replacedBy` decreto actually emitted a row for the same
#                  expediente (the replacement-existence guard). If it did
#                  not, the row is KEPT and flagged, never silently deleted.
#   amount-only -- an arithmetic correction. NEVER drops. Rewrites montoArs
#                  and preserves the originally published figure.
#
# Nothing here is ever hidden from the reader: every dropped act is republished
# in the `supersessions[]` array of data/adjudicaciones.json, labelled and
# excluded from totals, the same way the Q4-2025 debt anomaly is disclosed.

supersessions:
