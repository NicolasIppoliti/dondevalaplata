# Source registry for `etl archive` (design D4).
#
# Each top-level key is a capability. Static entries are declared here;
# `sibom` and `mcr-docs` stay empty below because they are enumerated
# dynamically at archive time (see `etl/sibom.py` and `etl/mcr_docs.py`) so
# newly published bulletins/documents are picked up automatically.
#
# All URLs verified live on 2026-07-06/07 (Slice 2 apply). See
# `sdd/portal-transparencia/apply-progress` (engram) for the verification
# method (curl HEAD/GET, CKAN API lookups, wp-json enumeration).
#
# Entry shape:
#   - id: <stable slug, referenced by sourceRefs and archive-manifest.json>
#     source: <host label>
#     source_url: <https://... official URL>
#     mime: <text/csv | application/pdf | application/json | application/zip
#           | application/vnd.openxmlformats-officedocument.spreadsheetml.sheet>
#     notes: <free text, e.g. municipio_id filter, known lag, drift caveats>
#     filename: <optional explicit local/R2 filename; defaults to id's last segment>

coparticipacion-viewer:
  - id: coparticipacion/transferencias-municipios
    source: catalogo.datos.gba.gob.ar
    source_url: https://catalogo.datos.gba.gob.ar/dataset/96ee21b4-b116-4b83-9228-ba664af1b480/resource/d13acdb6-bd59-4c09-b954-8f3258a65e8a/download/transferencias-municipios-012010_042026.csv
    mime: text/csv
    notes: >-
      Full monthly series 01/2010-04/2026, all municipios (filter to
      municipio_id 06182 = Coronel Rosales + neighbors at build time,
      per D3/D5). Primary coparticipacion source (dataset
      "transferencias-municipios", CKAN package_search verified).
    filename: transferencias-municipios-012010_042026.csv
  - id: coparticipacion/transferencias-diciembre-2023
    source: ec.gba.gov.ar
    source_url: "https://www.ec.gba.gov.ar/areas/Sub_Politica_Coord_Eco/CoordMunicipal/municipios/12-23 - Transferencias Diciembre 2023.xlsx"
    mime: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    notes: >-
      Per-year XLSX snapshot for December 2023, published by the
      Ministerio de Hacienda y Finanzas (Dirección Provincial de
      Coordinación Municipal). Supplementary/cross-check source, not the
      primary series consumed by build-coparticipacion.
    filename: transferencias-diciembre-2023.xlsx

