ipc:
  - id: ipc/nivel-general-nacional
    source: apis.datos.gob.ar
    source_url: https://apis.datos.gob.ar/series/api/series/?ids=148.3_INIVELNAL_DICI_M_26&start_date=2023-12-01&format=json&limit=1000
    mime: application/json
    notes: >-
      INDEC IPC Nivel General Nacional, base dic-2016=100, monthly,
      series-tiempo API. Series id 148.3_INIVELNAL_DICI_M_26 verified at
      apply-time (2026-07-06) against 3 known published monthly
      variations: Dec-2023 +25.47% (published ~25.5%), Jan-2024 +20.61%
      (~20.6%), Feb-2024 +13.24% (~13.2%). start_date pins the capture to
      Dec-2023 onward per D5; refetch without start_date for full
      history if ever needed.
      Re-verified at Slice 3 apply-time (task 3.1, VERIFY-AT-APPLY,
      2026-07-07) against all 12 known published monthly variations for
      calendar year 2024 (Jan +20.6% ... Dec +2.7%, INDEC's widely
      reported figures): every month matches within 0.1 percentage
      points. See etl/tests/test_ipc.py::
      test_ipc_series_matches_known_published_2024_variations for the
      executable regression check. Verdict: series id confirmed correct,
      safe to use for the build-ipc rebase (task 3.3).
    filename: ipc-nivel-general-nacional.json

asap-transparencia:
  - id: asap-transparencia/informe-mayo-2026
    source: asap.org.ar
    source_url: https://asap.org.ar/img_informes/06181547_InformeTransparenciaMunicipiosPBA-Mayo2026.pdf
    mime: application/pdf
    notes: >-
      "Índice de Transparencia Fiscal Municipal – Provincia de Buenos
      Aires", publicado por ASAP (Asociación Argentina de Presupuesto y
      Administración Financiera Pública, Filial Provincia de Buenos
      Aires) -- una asociación civil/profesional, NO un ministerio.
      Informe de Mayo 2026 (datos al 1er trimestre 2026). Coronel
      Rosales: 81/100 ("Alto cumplimiento"), desglose en página 24.
      sha256 pre-verificado por el dueño del proyecto al leer el PDF
      primario: 689df97fe6f383a136d6a74c88cecce910b8e3f72e1385aa4e8253338aa723ae
      -- re-verificado bit a bit contra el archivo efectivamente
      descargado por este pipeline (task 1, VERIFY-AT-APPLY).
    filename: informe-transparencia-municipios-pba-mayo-2026.pdf
  - id: asap-transparencia/informe-noviembre-2025
    source: asap.org.ar
    source_url: https://asap.org.ar/img_informes/12221419_InformeTransparenciaMunicipiosPBA-Noviembre2025.pdf
    mime: application/pdf
    notes: >-
      Mismo índice ASAP, informe anterior (Noviembre 2025): Coronel
      Rosales 70/100 ("cumplimiento medio"). Archivado para trazar la
      tendencia 70 -> 81 mostrada en /transparencia; no se usa ningún
      otro dato de este informe salvo el total y la categoría.
    filename: informe-transparencia-municipios-pba-noviembre-2025.pdf

poblacion-censo:
  - id: poblacion-censo/proyecciones-poblacion-2010-2025
    source: catalogo.datos.gba.gob.ar
    source_url: https://catalogo.datos.gba.gob.ar/dataset/cc6d2010-6f67-4c98-8d89-af39703f46fb/resource/09d57241-8437-454a-b4ff-88330d65d60e/download/proyecciones-poblacion-2010_2025.csv
    mime: text/csv
    notes: >-
      "Población" dataset, Dirección Provincial de Estadística (Ministerio
      de Economía de la Provincia de Buenos Aires) -- the SAME
      catalogo.datos.gba.gob.ar CKAN publisher already used for
      coparticipacion-viewer. Per-municipio series 2010-2025; the
      dataset's own CKAN notes (verbatim): "Datos relativos a la
      población de la Provincia (Censo 2010 y Censo 2022) y su
      proyección" -- only the 2010 and 2022 columns are actual Censo
      Nacional de Población, Hogares y Viviendas counts, every other
      year is a linear interpolation/projection. This build (feature
      H3a, per-cápita coparticipación) uses ONLY the 2022 column,
      filtered to the same four municipios as coparticipacion-viewer.
      Cross-verified at apply-time (2026-07-08): Coronel Rosales's 2022
      value (67.503) and 2010 value (62.152) both match, digit for
      digit, an independent press report (radiofm2001.com.ar, citing La
      Nueva / INDEC's official "datos definitivos del Censo 2022"
      release, published 22/11/2023) -- see etl/etl/poblacion.py's
      module docstring for the full verification note.
    filename: proyecciones-poblacion-2010-2025.csv

mcr-docs-snapshot:
  - id: mcr-docs-snapshot/documentos
    source: mcr.gob.ar
    source_url: "https://mcr.gob.ar/wp-json/wp/v2/documentos?per_page=100"
    mime: application/json
    notes: >-
      Raw WordPress REST API listing snapshot of every "documentos" post
      (Gobierno Abierto) -- archived verbatim, sha256-pinned, so
      `build-cadencia` derives the live per-ASAP-dimension publish cadence
      (latest period + lag) from a single provenance-tracked source,
      distinct from the individual PDF attachments already archived
      one-by-one under the `mcr-docs` capability. A listing change
      (document added/removed) is itself detectable via manifest
      content-drift, same as any other archived source.
    filename: documentos-snapshot.json

electoral:
  - id: electoral/2023-generales
    source: argentina.gob.ar
    source_url: https://www.argentina.gob.ar/sites/default/files/2023_generales_1.zip
    mime: application/zip
    notes: 2023 Elecciones Generales, mesa-level results ZIP. ~28MB, verified reachable (200, content-length 28028857).
    filename: 2023-generales.zip
  - id: electoral/2023-balotaje
    source: argentina.gob.ar
    source_url: https://www.argentina.gob.ar/sites/default/files/2023_segundavuelta.zip
    mime: application/zip
    notes: 2023 Balotaje (segunda vuelta), mesa-level results ZIP. ~3MB, verified reachable (200, content-length 3014122).
    filename: 2023-balotaje.zip
  - id: electoral/2025-legislativas
    source: datos.mininterior.gob.ar
    source_url: https://datos.mininterior.gob.ar/dataset/947e871a-650e-4b63-8939-ecb29acb717c/resource/a24110fb-bfcf-47a6-8aa7-2e53dab9caf5/download/elecciones_legislativas_2025.zip
    mime: application/zip
    notes: 2025 Elecciones Legislativas Nacionales, mesa-level results ZIP. ~13.5MB, verified reachable (200 after https redirect, content-length 13554180).
    filename: 2025-legislativas.zip
  - id: electoral/2023-paso-wayback
    source: web.archive.org
    source_url: https://web.archive.org/web/20240106010034if_/https://www.argentina.gob.ar/sites/default/files/dine-resultados/2023-PROVISORIOS_PASO.zip
    mime: application/zip
    notes: >-
      2023 PASO, mesa-level results ZIP. Official URL
      (argentina.gob.ar/sites/default/files/dine-resultados/2023-PROVISORIOS_PASO.zip)
      returns 404 as of 2026-07-06 -- this is the only surviving copy,
      via the Wayback Machine snapshot dated 2024-01-06 (the `if_`
      modifier serves the raw file without Wayback's HTML/JS injection).
      ~88MB (content-length 88157604 at the snapshot), can be slow to
      fetch from Wayback -- use a generous timeout and resume/retry.
    filename: 2023-paso.zip
    timeout: 180
