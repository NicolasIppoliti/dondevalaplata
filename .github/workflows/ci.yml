name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets the monthly data-refresh workflow explicitly validate the commit
  # it just pushed: a GITHUB_TOKEN push does not trigger `push`-triggered
  # workflows, but workflow_dispatch is exempt from that guard.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  etl:
    name: etl (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          working-directory: etl
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q

# The monthly data-refresh cron (D8) lives in a separate workflow
# (.github/workflows/etl-monthly.yml) so its schedule/permissions don't
# affect this fast push/PR gate.
