name: Monthly data refresh

# Refreshes the archived sources + rebuilt display JSON on a monthly
# cadence (D8). The provincial coparticipación CSV and the other source
# families publish with a ~2-3 month lag, so monthly polling is enough to
# catch new data without hammering the origins. `workflow_dispatch` is kept
# for manual/on-demand runs.
on:
  schedule:
    # 12:00 UTC on the 5th of each month (~09:00 ART).
    - cron: "0 12 5 * *"
  workflow_dispatch:

permissions:
  contents: write
  # Needed to dispatch the CI workflow below: a GITHUB_TOKEN push does NOT
  # trigger other workflows' `push` events (GitHub's anti-recursion guard),
  # but `workflow_dispatch`/`repository_dispatch` are explicitly exempted --
  # see https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
  actions: write

concurrency:
  # No cancel-in-progress: a manual dispatch should queue behind an
  # already-running refresh rather than race it for the same push.
  group: etl-monthly
  cancel-in-progress: false

jobs:
  refresh:
    name: archive + build + publish
    runs-on: ubuntu-latest
    # Archiving ~150 files across 6 source families, rate-limited
    # deliberately (see the mcr-docs 429 incident), can take a while.
    timeout-minutes: 60
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          working-directory: etl
          enable-cache: true

      - run: uv sync

      - name: Refresh the archive (all source families)
        run: uv run etl archive

      - name: Rebase the IPC series
        run: uv run etl build-ipc

      - name: Build the coparticipación display JSON
        run: uv run etl build-coparticipacion

      - name: Build the fallos display JSON
        run: uv run etl build-fallos

      - name: Backfill any R2 uploads missed during archive
        run: uv run etl sync-r2

      - name: Check for data changes
        id: diff
        working-directory: .
        run: |
          if [ -n "$(git status --porcelain -- data archive-manifest.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push the data refresh
        if: steps.diff.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data archive-manifest.json
          git commit -m "chore(data): monthly data refresh $(date -u +'%Y-%m')"
          git push

      - name: Trigger CI for the pushed data refresh
        if: steps.diff.outputs.changed == 'true'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref main
